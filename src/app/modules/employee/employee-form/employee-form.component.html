<div class="employee-form">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>{{ isEditMode ? 'Edit Employee' : 'Add Employee' }}</h2>
    <button type="button" class="btn btn-secondary" (click)="cancel()">
      <i class="bi bi-arrow-left"></i> Back
    </button>
  </div>

  <div class="card">
    <div class="card-body">
      <form [formGroup]="employeeForm" (ngSubmit)="onSubmit()" novalidate>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label for="firstName" class="form-label">First Name *</label>
            <input
              type="text"
              class="form-control"
              id="firstName"
              formControlName="firstName"
              [class.is-invalid]="employeeForm.get('firstName')?.invalid && employeeForm.get('firstName')?.touched">
            <div class="invalid-feedback" *ngIf="employeeForm.get('firstName')?.invalid && employeeForm.get('firstName')?.touched">
              First name is required
            </div>
          </div>

          <div class="col-md-6 mb-3">
            <label for="lastName" class="form-label">Last Name *</label>
            <input
              type="text"
              class="form-control"
              id="lastName"
              formControlName="lastName"
              [class.is-invalid]="employeeForm.get('lastName')?.invalid && employeeForm.get('lastName')?.touched">
            <div class="invalid-feedback" *ngIf="employeeForm.get('lastName')?.invalid && employeeForm.get('lastName')?.touched">
              Last name is required
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label for="email" class="form-label">Email *</label>
            <input
              type="email"
              class="form-control"
              id="email"
              formControlName="email"
              [class.is-invalid]="employeeForm.get('email')?.invalid && employeeForm.get('email')?.touched">
            <div class="invalid-feedback" *ngIf="employeeForm.get('email')?.invalid && employeeForm.get('email')?.touched">
              <div *ngIf="employeeForm.get('email')?.errors?.['required']">Email is required</div>
              <div *ngIf="employeeForm.get('email')?.errors?.['email']">Please enter a valid email</div>
            </div>
          </div>

          <div class="col-md-6 mb-3">
            <label for="phone" class="form-label">Phone</label>
            <input
              type="tel"
              class="form-control"
              id="phone"
              formControlName="phone">
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label for="department" class="form-label">Department</label>
            <select class="form-select" id="department" formControlName="department">
              <option value="">Select Department</option>
              <option value="hr">Human Resources</option>
              <option value="it">Information Technology</option>
              <option value="finance">Finance</option>
              <option value="marketing">Marketing</option>
            </select>
          </div>

          <div class="col-md-6 mb-3">
            <label for="designation" class="form-label">Designation</label>
            <input
              type="text"
              class="form-control"
              id="designation"
              formControlName="designation">
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label for="role" class="form-label">Role *</label>
            <select class="form-select" id="role" formControlName="role"
                    [class.is-invalid]="employeeForm.get('role')?.invalid && employeeForm.get('role')?.touched">
              <option value="employee">Employee</option>
              <option value="manager">Manager</option>
              <option value="hr">HR</option>
              <option value="admin">Admin</option>
            </select>
            <div class="invalid-feedback" *ngIf="employeeForm.get('role')?.invalid && employeeForm.get('role')?.touched">
              Role is required
            </div>
          </div>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary" [disabled]="isLoading">
            <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status"></span>
            {{ isLoading ? 'Saving...' : (isEditMode ? 'Update Employee' : 'Add Employee') }}
          </button>
          <button type="button" class="btn btn-secondary" (click)="cancel()">Cancel</button>
        </div>
      </form>
    </div>
  </div>
</div>
