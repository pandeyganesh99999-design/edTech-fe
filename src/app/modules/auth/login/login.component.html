<div class="container-fluid">
  <div class="row justify-content-center align-items-center min-vh-100">
    <div class="col-md-6 col-lg-4">
      <div class="card shadow">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <h2 class="fw-bold">Welcome Back</h2>
            <p class="text-muted">Sign in to your account</p>
          </div>

          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
            <div class="alert alert-info mb-3">
              Use <strong>admin@demo.com</strong> / <strong>Password123</strong> for instant login.
            </div>
            <!-- Error Message -->
            <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
              {{ errorMessage }}
            </div>

            <!-- Tenant Field -->
            <div class="mb-3">
              <label for="tenantId" class="form-label">Tenant</label>
              <select
                class="form-select"
                id="tenantId"
                formControlName="tenantId"
                [class.is-invalid]="loginForm.get('tenantId')?.invalid && loginForm.get('tenantId')?.touched">
                <option *ngFor="let tenant of tenantService.tenants" [value]="tenant.tenantId">
                  {{ tenant.tenantName }}
                </option>
              </select>
              <div class="invalid-feedback" *ngIf="loginForm.get('tenantId')?.invalid && loginForm.get('tenantId')?.touched">
                Tenant selection is required
              </div>
            </div>

            <!-- Email Field -->
            <div class="mb-3">
              <label for="email" class="form-label">Email Address</label>
              <input
                type="email"
                class="form-control"
                id="email"
                formControlName="email"
                [class.is-invalid]="email?.invalid && email?.touched"
                placeholder="Enter your email">
              <div class="invalid-feedback" *ngIf="email?.invalid && email?.touched">
                <div *ngIf="email?.errors?.['required']">Email is required</div>
                <div *ngIf="email?.errors?.['email']">Please enter a valid email</div>
              </div>
            </div>

            <!-- Password Field -->
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input
                type="password"
                class="form-control"
                id="password"
                formControlName="password"
                [class.is-invalid]="password?.invalid && password?.touched"
                placeholder="Enter your password">
              <div class="invalid-feedback" *ngIf="password?.invalid && password?.touched">
                <div *ngIf="password?.errors?.['required']">Password is required</div>
                <div *ngIf="password?.errors?.['minlength']">Password must be at least 6 characters</div>
              </div>
            </div>

            <!-- Submit Button -->
            <div class="d-grid">
              <button
                type="submit"
                class="btn btn-primary btn-lg"
                [disabled]="isLoading">
                <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status"></span>
                {{ isLoading ? 'Signing In...' : 'Sign In' }}
              </button>
            </div>
          </form>

          <!-- Forgot Password Link -->
          <div class="text-center mt-3">
            <a routerLink="/auth/forgot-password" class="text-decoration-none">
              Forgot your password?
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
